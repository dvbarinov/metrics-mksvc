# alembic.ini

[alembic]
# Путь к env.py
script_location = alembic

# Шаблон для миграций (поддерживает pydantic-style)
#file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Альтернатива (проще):
# file_template = %%(rev)s_%%(slug)s

# Синхронизация времени в миграциях
#timezone = UTC

# Префикс для ревизий (опционально)
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# URL базы данных (переопределяется в env.py для async)
# реальное подключение настраивается в Python
sqlalchemy.url = postgresql+asyncpg://postgres:12345@localhost:5432/metrics_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S